<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo & Goals — Cozy Corner</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .todo-page{max-width:900px;margin:0 auto;padding:40px 24px;animation:fadeInUp .6s ease-out}
        .todo-page h1{text-align:center;font-size:2.2rem;font-weight:700;color:white;text-shadow:0 4px 16px rgba(0,0,0,.3);margin-bottom:6px}
        .todo-page .subtitle{text-align:center;color:rgba(255,255,255,.7);font-size:1rem;margin-bottom:24px}
        .top-bar{display:flex;gap:10px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
        .gc{background:rgba(255,255,255,.2);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.3);border-radius:var(--radius-xl);padding:28px 24px;box-shadow:0 16px 48px rgba(0,0,0,.12);margin-bottom:28px}
        .gc h2{font-size:1.2rem;font-weight:700;color:var(--text-primary);margin-bottom:16px}
        /* Add row */
        .add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
        .add-row input[type="text"]{flex:1;min-width:180px;padding:12px 14px;border:1.5px solid rgba(90,122,46,.3);border-radius:var(--radius-sm);font-size:.95rem;font-family:var(--font);background:rgba(255,255,255,.5);outline:none}
        .add-row input:focus{border-color:var(--primary)}
        .add-row select,.add-row input[type="date"]{padding:10px 12px;border:1.5px solid rgba(90,122,46,.3);border-radius:var(--radius-sm);font-family:var(--font);font-size:.85rem;background:rgba(255,255,255,.5);outline:none;cursor:pointer}
        /* Tags */
        .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:6px}
        .tag-study{background:#e3f2fd;color:#1565c0}.tag-work{background:#fff3e0;color:#e65100}
        .tag-personal{background:#f3e5f5;color:#7b1fa2}.tag-health{background:#e8f5e9;color:#2e7d32}
        .tag-urgent{background:#ffebee;color:#c62828}.tag-other{background:#f5f5f5;color:#616161}
        /* Filter */
        .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
        .filter-btn{padding:6px 14px;border:1.5px solid rgba(90,122,46,.25);border-radius:20px;background:transparent;font-family:var(--font);font-size:.8rem;cursor:pointer;transition:all .2s;color:var(--text-primary)}
        .filter-btn.active,.filter-btn:hover{background:var(--primary);color:white;border-color:var(--primary)}
        /* Stats bar */
        .stats-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px;flex-wrap:wrap;gap:8px}
        .stats-bar span{font-size:.85rem;color:var(--text-muted);font-weight:500}
        .stats-bar strong{color:var(--primary)}
        .clear-all{background:none;border:none;color:#c83c3c;font-size:.85rem;font-weight:600;cursor:pointer;font-family:var(--font)}
        /* Task list */
        .task-list{list-style:none;padding:0;margin:0}
        .task-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:6px;background:rgba(255,255,255,.3);transition:all .2s;animation:fadeInUp .3s ease-out}
        .task-item:hover{background:rgba(255,255,255,.45)}
        .task-item input[type="checkbox"]{width:18px;height:18px;cursor:pointer;accent-color:var(--primary);flex-shrink:0}
        .task-item .t-content{flex:1;min-width:0}
        .task-item .t-text{font-size:.9rem;color:var(--text-primary);word-break:break-word}
        .task-item.done .t-text{text-decoration:line-through;color:var(--text-muted)}
        .task-item .t-meta{display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap}
        .task-item .t-due{font-size:.75rem;color:var(--text-muted)}
        .task-item .t-due.overdue{color:#c62828;font-weight:600}
        .task-item .del-btn{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--text-muted);padding:4px}
        .task-item .del-btn:hover{color:#c83c3c}
        .empty-st{text-align:center;padding:30px 20px;color:var(--text-muted);font-size:.9rem}
        /* Goals */
        .goal-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--radius-sm);margin-bottom:8px;background:rgba(255,255,255,.3);transition:all .2s}
        .goal-item:hover{background:rgba(255,255,255,.45)}
        .goal-item input[type="checkbox"]{width:20px;height:20px;accent-color:var(--accent);cursor:pointer}
        .goal-item .g-text{flex:1;font-size:.95rem;font-weight:600;color:var(--text-primary)}
        .goal-item.done .g-text{text-decoration:line-through;color:var(--text-muted)}
        .goal-item .del-btn{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--text-muted);padding:4px}
        .goal-add{display:flex;gap:8px;margin-bottom:16px}
        .goal-add input{flex:1;padding:12px 14px;border:1.5px solid rgba(90,122,46,.3);border-radius:var(--radius-sm);font-family:var(--font);font-size:.95rem;background:rgba(255,255,255,.5);outline:none}
        /* Analytics modal */
        .analytics-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);justify-content:center;align-items:center;z-index:200}
        .analytics-overlay.show{display:flex}
        .analytics-box{background:rgba(255,255,255,.92);backdrop-filter:blur(16px);padding:32px;border-radius:var(--radius-lg);width:400px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:scaleIn .3s ease}
        .analytics-box h3{font-size:1.3rem;font-weight:700;color:var(--text-primary);margin-bottom:20px;text-align:center}
        .a-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
        .a-card{background:rgba(90,122,46,.08);padding:16px;border-radius:var(--radius-sm);text-align:center}
        .a-card .a-num{font-size:1.8rem;font-weight:700;color:var(--primary)}
        .a-card .a-label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
        .a-bar-section h4{font-size:.9rem;font-weight:600;margin-bottom:10px;color:var(--text-primary)}
        .a-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
        .a-bar .a-bar-label{font-size:.8rem;width:70px;color:var(--text-muted)}
        .a-bar .a-bar-track{flex:1;height:10px;background:rgba(0,0,0,.06);border-radius:5px;overflow:hidden}
        .a-bar .a-bar-fill{height:100%;border-radius:5px;transition:width .5s ease}
        .a-bar .a-bar-count{font-size:.8rem;color:var(--text-muted);width:24px;text-align:right}
        .a-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-muted)}
        /* Confetti canvas */
        #confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998}
        @media(max-width:768px){.todo-page h1{font-size:1.7rem}.gc{padding:20px 16px}.a-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <video autoplay muted loop id="bgVideo"><source src="night-rain.mp4" type="video/mp4"></video>
    <div class="bg-overlay"></div>
    <canvas id="confettiCanvas"></canvas>

    <div class="todo-page">
        <h1>Todo & Goals</h1>
        <p class="subtitle">Track tasks, set goals, stay on top</p>
        <div class="top-bar">
            <button class="btn-primary-cozy" onclick="openAnalytics()">Analytics</button>
        </div>

        <!-- GOALS -->
        <div class="gc">
            <h2>Goals</h2>
            <div class="goal-add">
                <input type="text" id="goalInput" placeholder="Set a new goal...">
                <button class="btn-primary-cozy" onclick="addGoal()">+ Goal</button>
            </div>
            <div id="goalList"></div>
            <div class="empty-st" id="goalEmpty">No goals yet. Dream big!</div>
        </div>

        <!-- TASKS -->
        <div class="gc">
            <h2>Tasks</h2>
            <div class="add-row">
                <input type="text" id="todoInput" placeholder="Add a task...">
                <select id="tagSelect">
                    <option value="study">Study</option>
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                    <option value="health">Health</option>
                    <option value="urgent">Urgent</option>
                    <option value="other">Other</option>
                </select>
                <input type="date" id="dueDate">
                <button class="btn-primary-cozy" onclick="addTask()">+ Add</button>
            </div>
            <div class="filter-row" id="filterRow">
                <button class="filter-btn active" onclick="filterTasks('all',this)">All</button>
                <button class="filter-btn" onclick="filterTasks('study',this)">Study</button>
                <button class="filter-btn" onclick="filterTasks('work',this)">Work</button>
                <button class="filter-btn" onclick="filterTasks('personal',this)">Personal</button>
                <button class="filter-btn" onclick="filterTasks('health',this)">Health</button>
                <button class="filter-btn" onclick="filterTasks('urgent',this)">Urgent</button>
            </div>
            <div class="stats-bar">
                <span><strong id="taskCount">0</strong> tasks | <strong id="doneCount">0</strong> done</span>
                <button class="clear-all" onclick="clearDone()">Clear Done</button>
            </div>
            <ul class="task-list" id="taskList"></ul>
            <div class="empty-st" id="taskEmpty">No tasks yet. Add one above!</div>
        </div>
    </div>

    <!-- ANALYTICS MODAL -->
    <div class="analytics-overlay" id="analyticsOverlay" onclick="if(event.target===this)closeAnalytics()">
        <div class="analytics-box" style="position:relative">
            <button class="a-close" onclick="closeAnalytics()">X</button>
            <h3>Analytics</h3>
            <div class="a-grid" id="aGrid"></div>
            <div class="a-bar-section" id="aBarSection"></div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
    initNavbar('todo');

    var tasks = [];
    var goals = [];
    var currentFilter = 'all';

    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function today() { return new Date().toISOString().split('T')[0]; }

    // ========== LOAD DATA FROM DB ==========
    async function loadData() {
        var uid = getUserId();
        if (!uid) { console.log('No user logged in — data will not persist to DB'); render(); return; }
        console.log('[Todo] Loading data for user_id:', uid);
        var dbTasks = await apiGet('/tasks?user_id=' + uid);
        if (dbTasks && Array.isArray(dbTasks)) {
            tasks = dbTasks.map(function(t) {
                return { task_id: t.task_id, text: t.title, tag: (t.tags && t.tags[0]) || 'other', due: t.due_date ? t.due_date.split('T')[0] : '', done: t.status === 'completed', created: t.created_at };
            });
            console.log('[Todo] Loaded', tasks.length, 'tasks from DB');
        }
        var dbGoals = await apiGet('/goals?user_id=' + uid);
        if (dbGoals && Array.isArray(dbGoals)) {
            goals = dbGoals.map(function(g) {
                return { goal_id: g.goal_id, text: g.title, done: g.status === 'completed', created: g.created_at };
            });
            console.log('[Todo] Loaded', goals.length, 'goals from DB');
        }
        render();
    }

    // ========== TASKS ==========
    async function addTask() {
        var text = document.getElementById('todoInput').value.trim();
        if (!text) return;
        var tag = document.getElementById('tagSelect').value;
        var due = document.getElementById('dueDate').value;
        var uid = getUserId();
        if (uid) {
            console.log('[Todo] POST /api/tasks', { user_id: uid, title: text, tags: [tag], due_date: due || null });
            var result = await apiPost('/tasks', { user_id: uid, title: text, tags: [tag], due_date: due || null });
            if (result && result.task_id) {
                tasks.push({ task_id: result.task_id, text: text, tag: tag, due: due, done: false, created: today() });
                showToast('Task added!', 'success', 2000);
            } else { showToast('Failed to save task', 'error'); }
        } else {
            tasks.push({ text: text, tag: tag, due: due, done: false, created: today() });
            showToast('Login to save tasks to your account', 'warning', 3000);
        }
        document.getElementById('todoInput').value = '';
        document.getElementById('dueDate').value = '';
        render();
    }

    document.getElementById('todoInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') addTask(); });

    async function toggleTask(i) {
        tasks[i].done = !tasks[i].done;
        var uid = getUserId();
        if (uid && tasks[i].task_id) {
            var newStatus = tasks[i].done ? 'completed' : 'pending';
            await apiPut('/tasks/' + tasks[i].task_id, { status: newStatus });
            if (tasks[i].done) {
                apiPost('/notifications', { user_id: uid, message: 'Task completed: ' + tasks[i].text, type: 'success' });
                apiPost('/achievements/check', { user_id: uid });
            }
        }
        render();
        if (tasks[i].done) fireConfetti();
    }

    async function deleteTask(i) {
        var uid = getUserId();
        if (uid && tasks[i].task_id) {
            console.log('[Todo] DELETE /api/tasks/' + tasks[i].task_id);
            await apiDelete('/tasks/' + tasks[i].task_id);
        }
        tasks.splice(i, 1); render();
    }

    async function clearDone() {
        var uid = getUserId();
        for (var j = tasks.length - 1; j >= 0; j--) {
            if (tasks[j].done) {
                if (uid && tasks[j].task_id) await apiDelete('/tasks/' + tasks[j].task_id);
                tasks.splice(j, 1);
            }
        }
        render();
    }

    function filterTasks(tag, el) {
        currentFilter = tag;
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        if (el) el.classList.add('active');
        render();
    }

    function render() {
        var list = document.getElementById('taskList');
        list.innerHTML = '';
        var filtered = currentFilter === 'all' ? tasks : tasks.filter(function(t) { return t.tag === currentFilter; });
        filtered.forEach(function(t, fi) {
            var ri = tasks.indexOf(t);
            var isOverdue = t.due && !t.done && t.due < today();
            var li = document.createElement('li');
            li.className = 'task-item' + (t.done ? ' done' : '');
            li.innerHTML =
                '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' onchange="toggleTask(' + ri + ')">' +
                '<div class="t-content"><div class="t-text">' + esc(t.text) + '</div>' +
                '<div class="t-meta"><span class="tag tag-' + t.tag + '">' + t.tag + '</span>' +
                (t.due ? '<span class="t-due' + (isOverdue ? ' overdue' : '') + '">' + (isOverdue ? 'Overdue: ' : 'Due: ') + t.due + '</span>' : '') +
                '</div></div>' +
                '<button class="del-btn" onclick="deleteTask(' + ri + ')">&#10005;</button>';
            list.appendChild(li);
        });
        document.getElementById('taskCount').textContent = tasks.length;
        document.getElementById('doneCount').textContent = tasks.filter(function(t) { return t.done; }).length;
        document.getElementById('taskEmpty').style.display = filtered.length === 0 ? 'block' : 'none';
        var gl = document.getElementById('goalList');
        gl.innerHTML = '';
        goals.forEach(function(g, i) {
            var div = document.createElement('div');
            div.className = 'goal-item' + (g.done ? ' done' : '');
            div.innerHTML =
                '<input type="checkbox" ' + (g.done ? 'checked' : '') + ' onchange="toggleGoal(' + i + ')">' +
                '<span class="g-text">' + esc(g.text) + '</span>' +
                '<button class="del-btn" onclick="deleteGoal(' + i + ')">&#10005;</button>';
            gl.appendChild(div);
        });
        document.getElementById('goalEmpty').style.display = goals.length === 0 ? 'block' : 'none';
    }

    // ========== GOALS ==========
    async function addGoal() {
        var text = document.getElementById('goalInput').value.trim();
        if (!text) return;
        var uid = getUserId();
        if (uid) {
            console.log('[Todo] POST /api/goals', { user_id: uid, title: text });
            var result = await apiPost('/goals', { user_id: uid, title: text });
            if (result && result.goal_id) {
                goals.push({ goal_id: result.goal_id, text: text, done: false, created: today() });
                showToast('Goal added!', 'success', 2000);
            } else { showToast('Failed to save goal', 'error'); }
        } else {
            goals.push({ text: text, done: false, created: today() });
            showToast('Login to save goals to your account', 'warning', 3000);
        }
        document.getElementById('goalInput').value = '';
        render();
    }

    document.getElementById('goalInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') addGoal(); });

    async function toggleGoal(i) {
        goals[i].done = !goals[i].done;
        var uid = getUserId();
        if (uid && goals[i].goal_id) {
            var newStatus = goals[i].done ? 'completed' : 'active';
            await apiPut('/goals/' + goals[i].goal_id, { status: newStatus });
            if (goals[i].done) {
                apiPost('/notifications', { user_id: uid, message: 'Goal completed: ' + goals[i].text + ' 🎯', type: 'success' });
                apiPost('/achievements/check', { user_id: uid });
            }
        }
        render();
        if (goals[i].done) fireConfetti();
    }

    async function deleteGoal(i) {
        var uid = getUserId();
        if (uid && goals[i].goal_id) {
            console.log('[Todo] DELETE /api/goals/' + goals[i].goal_id);
            await apiDelete('/goals/' + goals[i].goal_id);
        }
        goals.splice(i, 1); render();
    }

    // ========== ANALYTICS (now from DB) ==========
    async function openAnalytics() {
        var uid = getUserId();
        if (uid) {
            var data = await apiGet('/analytics?user_id=' + uid);
            if (data) {
                var t = data.tasks || {}; var g = data.goals || {};
                var total = t.total || 0, done = t.completed || 0, overdue = t.overdue || 0;
                var rate = total > 0 ? Math.round(done / total * 100) : 0;
                document.getElementById('aGrid').innerHTML =
                    '<div class="a-card"><div class="a-num">' + total + '</div><div class="a-label">Total Tasks</div></div>' +
                    '<div class="a-card"><div class="a-num">' + done + '</div><div class="a-label">Completed</div></div>' +
                    '<div class="a-card"><div class="a-num">' + rate + '%</div><div class="a-label">Completion</div></div>' +
                    '<div class="a-card"><div class="a-num" style="color:#c62828">' + (overdue||0) + '</div><div class="a-label">Overdue</div></div>' +
                    '<div class="a-card"><div class="a-num">' + (g.total||0) + '</div><div class="a-label">Goals Set</div></div>' +
                    '<div class="a-card"><div class="a-num">' + (g.completed||0) + '</div><div class="a-label">Goals Done</div></div>';
                document.getElementById('aBarSection').innerHTML = '<h4>Focus: ' + Math.round((data.summary?.total_focus||0)/60) + ' min</h4>';
                document.getElementById('analyticsOverlay').classList.add('show');
                return;
            }
        }
        // Fallback to local
        var total = tasks.length, done = tasks.filter(function(t){return t.done}).length;
        var overdue = tasks.filter(function(t){return t.due && !t.done && t.due < today()}).length;
        var rate = total > 0 ? Math.round(done / total * 100) : 0;
        var gTotal = goals.length, gDone = goals.filter(function(g){return g.done}).length;
        document.getElementById('aGrid').innerHTML =
            '<div class="a-card"><div class="a-num">' + total + '</div><div class="a-label">Total Tasks</div></div>' +
            '<div class="a-card"><div class="a-num">' + done + '</div><div class="a-label">Completed</div></div>' +
            '<div class="a-card"><div class="a-num">' + rate + '%</div><div class="a-label">Completion</div></div>' +
            '<div class="a-card"><div class="a-num" style="color:#c62828">' + overdue + '</div><div class="a-label">Overdue</div></div>' +
            '<div class="a-card"><div class="a-num">' + gTotal + '</div><div class="a-label">Goals Set</div></div>' +
            '<div class="a-card"><div class="a-num">' + gDone + '</div><div class="a-label">Goals Done</div></div>';
        var tags = ['study','work','personal','health','urgent','other'];
        var colors = {study:'#1565c0',work:'#e65100',personal:'#7b1fa2',health:'#2e7d32',urgent:'#c62828',other:'#616161'};
        var html = '<h4>Tasks by Category</h4>';
        tags.forEach(function(tag) {
            var count = tasks.filter(function(t){return t.tag===tag}).length;
            var pct = total > 0 ? Math.round(count / total * 100) : 0;
            html += '<div class="a-bar"><span class="a-bar-label">' + tag.charAt(0).toUpperCase() + tag.slice(1) + '</span><div class="a-bar-track"><div class="a-bar-fill" style="width:' + pct + '%;background:' + colors[tag] + '"></div></div><span class="a-bar-count">' + count + '</span></div>';
        });
        document.getElementById('aBarSection').innerHTML = html;
        document.getElementById('analyticsOverlay').classList.add('show');
    }

    function closeAnalytics() { document.getElementById('analyticsOverlay').classList.remove('show'); }

    // ========== CONFETTI ==========
    var confettiCanvas = document.getElementById('confettiCanvas');
    var cCtx = confettiCanvas.getContext('2d');
    var confettiPieces = [];
    var confettiRunning = false;

    function resizeConfetti() { confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeConfetti);
    resizeConfetti();

    function fireConfetti() {
        confettiPieces = [];
        var colors = ['#e8a838','#5a7a2e','#2196F3','#E53935','#7b1fa2','#f0c36d','#1ed760'];
        for (var i = 0; i < 120; i++) {
            confettiPieces.push({ x: Math.random() * confettiCanvas.width, y: Math.random() * confettiCanvas.height * 0.5 - confettiCanvas.height * 0.3, w: Math.random() * 8 + 4, h: Math.random() * 6 + 3, color: colors[Math.floor(Math.random() * colors.length)], vx: (Math.random() - 0.5) * 6, vy: Math.random() * 4 + 2, rot: Math.random() * 360, rv: (Math.random() - 0.5) * 10, life: 1 });
        }
        if (!confettiRunning) { confettiRunning = true; animateConfetti(); }
    }

    function animateConfetti() {
        cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        var alive = false;
        confettiPieces.forEach(function(p) {
            if (p.life <= 0) return; alive = true;
            p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.rot += p.rv; p.life -= 0.008;
            cCtx.save(); cCtx.translate(p.x, p.y); cCtx.rotate(p.rot * Math.PI / 180);
            cCtx.globalAlpha = Math.max(0, p.life); cCtx.fillStyle = p.color;
            cCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); cCtx.restore();
        });
        if (alive) requestAnimationFrame(animateConfetti);
        else { confettiRunning = false; cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height); }
    }

    // Load from DB on page load
    loadData();
    </script>
</body>
